name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  zip:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIPNAME="mainframe.zip"

          # Copy filtered files into /tmp/mainframe/ so the zip contains a
          # single top-level "mainframe/" folder — required by the WordPress
          # theme installer and correct for manual extraction.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='README.md' \
            --exclude='bin/' \
            --exclude='.DS_Store' \
            --exclude='*.zip' \
            . /tmp/mainframe/

          cd /tmp
          zip -r "$GITHUB_WORKSPACE/$ZIPNAME" mainframe/

          echo "ZIPNAME=$ZIPNAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Mainframe ${{ env.VERSION }}"
          generate_release_notes: true
          files: ${{ env.ZIPNAME }}
